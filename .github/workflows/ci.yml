name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop, feature/**, copilot/** ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: chocotechnologies/dmod:1.0.4
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build dm_sw_ring project
        run: |
          mkdir -p build
          cd build
          cmake .. -DDMOD_MODE=DMOD_MODULE
          cmake --build .
      
      - name: Verify module files
        run: |
          echo "Checking for module files..."
          ls -lh build/dmf/
          test -f build/dmf/dm_sw_ring.dmf
          test -f build/dmf/dm_sw_ring_version.txt
          test -f build/dmf/test_dm_sw_ring.dmf
          echo "Module files present"
      
      - name: Run tests with dmod_loader
        run: |
          export DMOD_DMF_DIR=$(pwd)/build/dmf
          dmod_loader build/dmf/test_dm_sw_ring.dmf
